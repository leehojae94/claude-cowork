<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>차량정보조회 API 테스트 — 기웅정보통신</title>
  <style>
    :root {
      --primary: #1a56db;
      --primary-dark: #1341b0;
      --border: #e2e8f0;
      --text: #1a202c;
      --text-muted: #64748b;
      --bg: #f8fafc;
      --card: #ffffff;
      --tag-bg: #eff6ff;
      --tag-text: #1e40af;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    header {
      background: var(--primary);
      color: #fff;
      padding: 18px 32px;
      display: flex;
      align-items: center;
      gap: 14px;
      box-shadow: 0 2px 8px rgba(26,86,219,.25);
    }
    header .logo { font-size: 20px; font-weight: 700; }
    header .badge {
      font-size: 11px;
      background: rgba(255,255,255,.2);
      border-radius: 99px;
      padding: 2px 10px;
      font-weight: 500;
    }

    .container {
      max-width: 820px;
      margin: 0 auto;
      padding: 32px 20px 60px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
    }
    .card-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: .6px;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .env-toggle { display: flex; gap: 8px; }
    .env-btn {
      flex: 1;
      padding: 10px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      background: #fff;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-muted);
      transition: all .15s;
      text-align: center;
    }
    .env-btn.active {
      border-color: var(--primary);
      background: var(--tag-bg);
      color: var(--primary);
    }
    .env-url {
      font-size: 11.5px;
      color: var(--text-muted);
      margin-top: 10px;
      padding: 8px 12px;
      background: #f1f5f9;
      border-radius: 6px;
      word-break: break-all;
      font-family: monospace;
    }

    .form-group { margin-bottom: 14px; }
    .form-group:last-child { margin-bottom: 0; }
    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 6px;
    }
    label .required { color: #e53e3e; margin-left: 2px; }
    label .hint { font-weight: 400; color: var(--text-muted); font-size: 12px; margin-left: 4px; }
    input[type="text"] {
      width: 100%;
      padding: 10px 14px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-size: 14px;
      color: var(--text);
      transition: border-color .15s;
      outline: none;
      background: #fff;
    }
    input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(26,86,219,.12);
    }

    .submit-btn {
      width: 100%;
      padding: 13px;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 20px;
    }
    .submit-btn:hover:not(:disabled) { background: var(--primary-dark); }
    .submit-btn:disabled { opacity: .6; cursor: not-allowed; }
    .spinner {
      width: 18px; height: 18px;
      border: 2.5px solid rgba(255,255,255,.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      display: none;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #result { display: none; }

    .result-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .result-status { display: flex; align-items: center; gap: 8px; }
    .status-dot { width: 10px; height: 10px; border-radius: 50%; background: #cbd5e0; }
    .status-dot.success { background: #38a169; }
    .status-dot.error   { background: #e53e3e; }
    .status-text { font-size: 14px; font-weight: 600; }
    .json-toggle {
      font-size: 12px;
      padding: 5px 12px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: #fff;
      cursor: pointer;
      color: var(--text-muted);
    }
    .json-toggle:hover { background: #f1f5f9; }

    .car-card { border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
    .car-card-top {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 20px;
      background: #f8fafc;
      border-bottom: 1px solid var(--border);
    }
    .car-img-wrap {
      width: 100px; height: 70px;
      background: #e2e8f0;
      border-radius: 8px;
      overflow: hidden;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .car-img-wrap img { width: 100%; height: 100%; object-fit: cover; }
    .car-img-wrap .no-img { font-size: 30px; }
    .car-name-group h2 { font-size: 18px; font-weight: 700; }
    .car-name-group .sub { font-size: 13px; color: var(--text-muted); margin-top: 4px; }
    .car-name-group .tags { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
    .tag {
      font-size: 11.5px;
      padding: 2px 10px;
      border-radius: 99px;
      background: var(--tag-bg);
      color: var(--tag-text);
      font-weight: 500;
    }

    .info-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1px;
      background: var(--border);
    }
    .info-cell { background: #fff; padding: 14px 16px; }
    .info-cell .label {
      font-size: 11px;
      color: var(--text-muted);
      font-weight: 500;
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: .4px;
    }
    .info-cell .value { font-size: 14px; font-weight: 600; }

    .section-label {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: .4px;
      padding: 12px 16px 6px;
      border-top: 1px solid var(--border);
      background: #f8fafc;
    }
    .battery-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .battery-table th {
      background: #f1f5f9;
      padding: 8px 14px;
      text-align: left;
      font-size: 11.5px;
      color: var(--text-muted);
      font-weight: 600;
    }
    .battery-table td { padding: 9px 14px; border-top: 1px solid var(--border); }
    .battery-table tr:hover td { background: #f8fafc; }

    .error-box {
      background: #fff5f5;
      border: 1px solid #fed7d7;
      border-radius: 10px;
      padding: 16px 20px;
      display: flex;
      gap: 12px;
      align-items: flex-start;
    }
    .error-icon { font-size: 20px; flex-shrink: 0; }
    .error-title { font-weight: 700; color: #c81e1e; font-size: 14px; }
    .error-msg { font-size: 13px; color: #742a2a; margin-top: 4px; }

    .json-view {
      display: none;
      background: #1e293b;
      border-radius: 10px;
      padding: 16px;
      overflow-x: auto;
      margin-top: 16px;
    }
    .json-view pre {
      font-family: 'Consolas', 'Monaco', monospace;
      font-size: 12.5px;
      color: #e2e8f0;
      white-space: pre-wrap;
      word-break: break-all;
    }
    .json-view.visible { display: block; }

    footer {
      text-align: center;
      font-size: 12px;
      color: #94a3b8;
      margin-top: 16px;
    }
  </style>
</head>
<body>

<header>
  <span class="logo">🚗 차량정보조회 API</span>
  <span class="badge">내부 테스트 도구</span>
</header>

<div class="container">

  <!-- ① 환경 선택 -->
  <div class="card">
    <div class="card-title">🔧 환경 설정</div>
    <div class="form-group">
      <label>서버 환경</label>
      <div class="env-toggle">
        <button class="env-btn active" onclick="setEnv('dev', this)">개발계 (Dev)</button>
        <button class="env-btn" onclick="setEnv('prod', this)">운영계 (Prod)</button>
      </div>
      <div class="env-url" id="envUrl">/api/proxy?env=dev → datahub-dev.scraping.co.kr</div>
    </div>
  </div>

  <!-- ② 조회 입력 -->
  <div class="card">
    <div class="card-title">🔍 조회 정보 입력</div>

    <div class="form-group">
      <label>자동차등록번호 <span class="required">*</span><span class="hint">예: 23사5678</span></label>
      <input type="text" id="reginumber" placeholder="예: 23사5678" />
    </div>

    <div class="form-group">
      <label>소유자명 <span class="required">*</span><span class="hint">예: 홍길동</span></label>
      <input type="text" id="ownername" placeholder="예: 홍길동" />
    </div>

    <button class="submit-btn" id="submitBtn" onclick="callApi()">
      <span class="spinner" id="spinner"></span>
      <span id="btnText">조회하기</span>
    </button>
  </div>

  <!-- ③ 결과 -->
  <div id="result" class="card">
    <div class="result-header">
      <div class="result-status">
        <span class="status-dot" id="statusDot"></span>
        <span class="status-text" id="statusText"></span>
      </div>
      <button class="json-toggle" id="jsonToggleBtn" onclick="toggleJson()">JSON 보기</button>
    </div>

    <!-- 성공 -->
    <div id="successView">
      <div class="car-card">
        <div class="car-card-top">
          <div class="car-img-wrap">
            <img id="carImg" src="" alt="" onerror="this.parentElement.innerHTML='<span class=no-img>🚗</span>'" />
          </div>
          <div class="car-name-group">
            <h2 id="carName">—</h2>
            <div class="sub" id="carSubModel">—</div>
            <div class="tags">
              <span class="tag" id="carYear">—</span>
              <span class="tag" id="carFuel">—</span>
              <span class="tag" id="carMission">—</span>
            </div>
          </div>
        </div>

        <div class="info-grid">
          <div class="info-cell"><div class="label">제조사</div><div class="value" id="carVender">—</div></div>
          <div class="info-cell"><div class="label">구동방식</div><div class="value" id="carDrive">—</div></div>
          <div class="info-cell"><div class="label">배기량</div><div class="value" id="carCC">—</div></div>
          <div class="info-cell"><div class="label">신차가격</div><div class="value" id="carPrice">—</div></div>
          <div class="info-cell"><div class="label">연비</div><div class="value" id="carFuelEco">—</div></div>
          <div class="info-cell"><div class="label">연료탱크</div><div class="value" id="carFuelTank">—</div></div>
          <div class="info-cell"><div class="label">앞타이어</div><div class="value" id="carFrontTire">—</div></div>
          <div class="info-cell"><div class="label">뒷타이어</div><div class="value" id="carRearTire">—</div></div>
          <div class="info-cell"><div class="label">좌석수</div><div class="value" id="carSeats">—</div></div>
          <div class="info-cell"><div class="label">와이퍼</div><div class="value" id="carWiper">—</div></div>
          <div class="info-cell"><div class="label">엔진오일</div><div class="value" id="carOilLiter">—</div></div>
          <div class="info-cell"><div class="label">차대번호</div><div class="value" id="carVin" style="font-size:12px">—</div></div>
        </div>

        <div class="section-label">🔋 배터리 정보</div>
        <table class="battery-table">
          <thead><tr><th>제조사</th><th>모델</th><th>종류</th></tr></thead>
          <tbody id="batteryBody"></tbody>
        </table>
      </div>
    </div>

    <!-- 실패 -->
    <div id="errorView" style="display:none">
      <div class="error-box">
        <span class="error-icon">❌</span>
        <div>
          <div class="error-title" id="errorTitle">조회 실패</div>
          <div class="error-msg" id="errorMsg">—</div>
        </div>
      </div>
    </div>

    <!-- Raw JSON -->
    <div class="json-view" id="jsonView">
      <pre id="jsonPre"></pre>
    </div>
  </div>

  <footer>기웅정보통신 솔루션사업팀 · 내부 전용 테스트 도구 · dataapi.co.kr</footer>
</div>

<script>
  const ENV_LABELS = {
    dev:  '/api/proxy?env=dev → datahub-dev.scraping.co.kr',
    prod: '/api/proxy?env=prod → api.mydatahub.co.kr'
  };
  let currentEnv = 'dev';
  let showJson = false;

  function setEnv(env, btn) {
    currentEnv = env;
    document.querySelectorAll('.env-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('envUrl').textContent = ENV_LABELS[env];
  }

  function toggleJson() {
    showJson = !showJson;
    document.getElementById('jsonView').classList.toggle('visible', showJson);
    document.getElementById('jsonToggleBtn').textContent = showJson ? 'JSON 닫기' : 'JSON 보기';
  }

  function v(val, suffix) {
    return (!val || val === '') ? '—' : (suffix ? val + suffix : val);
  }

  function renderSuccess(d) {
    document.getElementById('carName').textContent    = ((d.CARVENDER || '') + ' ' + (d.CARNAME || '')).trim() || '—';
    document.getElementById('carSubModel').textContent = v(d.SUBMODEL);
    document.getElementById('carYear').textContent    = v(d.CARYEAR) + '년식';
    document.getElementById('carFuel').textContent    = v(d.FUEL);
    document.getElementById('carMission').textContent = v(d.MISSION);
    document.getElementById('carVender').textContent  = v(d.CARVENDER);
    document.getElementById('carDrive').textContent   = v(d.DRIVE);
    document.getElementById('carCC').textContent      = d.CC ? d.CC + ' cc' : '—';
    document.getElementById('carPrice').textContent   = d.PRICE ? Number(d.PRICE).toLocaleString() + ' 원' : '—';
    document.getElementById('carFuelEco').textContent = d.FUELECO ? d.FUELECO + ' km/L' : '—';
    document.getElementById('carFuelTank').textContent= d.FUELTANK ? d.FUELTANK + ' L' : '—';
    document.getElementById('carFrontTire').textContent = v(d.FRONTTIRE);
    document.getElementById('carRearTire').textContent  = v(d.REARTIRE);
    document.getElementById('carSeats').textContent   = d.SEATS ? d.SEATS + ' 석' : '—';
    document.getElementById('carWiper').textContent   = v(d.WIPER);
    document.getElementById('carOilLiter').textContent= d.EOILLITER ? d.EOILLITER + ' L' : '—';
    document.getElementById('carVin').textContent     = v(d.VIN);
    if (d.CARURL) document.getElementById('carImg').src = 'https://www.cartory.net/cars/' + d.CARURL;

    const tb = document.getElementById('batteryBody');
    tb.innerHTML = '';
    if (d.BATTERYLIST && d.BATTERYLIST.length > 0) {
      d.BATTERYLIST.forEach(b => {
        const tr = document.createElement('tr');
        tr.innerHTML = `<td>${b.BRAND||'—'}</td><td>${b.MODEL||'—'}</td><td>${b.TYPE||'—'}</td>`;
        tb.appendChild(tr);
      });
    } else {
      tb.innerHTML = '<tr><td colspan="3" style="color:#94a3b8;text-align:center;padding:14px">배터리 정보 없음</td></tr>';
    }
    document.getElementById('successView').style.display = 'block';
    document.getElementById('errorView').style.display   = 'none';
  }

  function renderError(code, msg) {
    document.getElementById('errorTitle').textContent = '조회 실패' + (code ? ` (errCode: ${code})` : '');
    document.getElementById('errorMsg').textContent   = msg || '알 수 없는 오류가 발생했습니다.';
    document.getElementById('successView').style.display = 'none';
    document.getElementById('errorView').style.display   = 'block';
  }

  async function callApi() {
    const regno = document.getElementById('reginumber').value.trim();
    const owner = document.getElementById('ownername').value.trim();
    if (!regno) return alert('자동차등록번호를 입력해주세요.');
    if (!owner) return alert('소유자명을 입력해주세요.');

    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    document.getElementById('spinner').style.display = 'block';
    document.getElementById('btnText').textContent   = '조회 중...';
    document.getElementById('result').style.display  = 'none';

    try {
      const res = await fetch(`/api/proxy?env=${currentEnv}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ REGINUMBER: regno, OWNERNAME: owner })
      });

      const json = await res.json();

      document.getElementById('result').style.display = 'block';
      document.getElementById('jsonPre').textContent  = JSON.stringify(json, null, 2);

      const dot  = document.getElementById('statusDot');
      const text = document.getElementById('statusText');

      if (json.result === 'SUCCESS' && json.data && json.data.RESPONSE === 'true') {
        dot.className = 'status-dot success';
        text.textContent = '✅ 조회 성공';
        renderSuccess(json.data);
      } else {
        dot.className = 'status-dot error';
        text.textContent = '❌ 조회 실패';
        renderError(json.errCode, json.errMsg);
      }
    } catch (err) {
      alert('네트워크 오류: ' + err.message);
    } finally {
      btn.disabled = false;
      document.getElementById('spinner').style.display = 'none';
      document.getElementById('btnText').textContent   = '조회하기';
    }
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') callApi();
  });
</script>
</body>
</html>
